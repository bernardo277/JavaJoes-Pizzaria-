<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Java Joe's</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
    body{background:#0a0a0a;color:#e0e0e0;min-height:100vh}
    #loginScreen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 100%)}
    .login-box{background:#1a1a1a;padding:40px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);width:100%;max-width:400px;border:1px solid #2a2a2a}
    .login-box h1{color:#c41e3a;margin-bottom:30px;text-align:center;font-size:28px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;color:#999;margin-bottom:8px;font-size:14px}
    .form-group input{width:100%;padding:12px;background:#0a0a0a;border:2px solid #3a3a3a;border-radius:6px;color:#e0e0e0;font-size:15px}
    .form-group input:focus{outline:none;border-color:#c41e3a}
    .btn-login{width:100%;padding:14px;background:#c41e3a;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s}
    .btn-login:hover{background:#a01729;transform:translateY(-2px)}
    .login-error{display:none;background:rgba(196,30,58,.1);border:1px solid #c41e3a;color:#ff6b6b;padding:12px;border-radius:6px;margin-bottom:20px;font-size:14px}
    #adminPanel{display:none;padding:20px;max-width:1400px;margin:0 auto}
    .header{background:#1a1a1a;padding:30px;border-radius:12px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;border:1px solid #2a2a2a}
    .header h1{color:#c41e3a;font-size:32px}
    .btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;transition:all .3s}
    .btn-logout{background:#666;color:#fff}
    .btn-logout:hover{background:#444}
    .btn-refresh{background:#2196f3;color:#fff;margin-right:10px}
    .btn-refresh:hover{background:#1976d2}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
    .stat-card{background:#1a1a1a;padding:25px;border-radius:12px;border:1px solid #2a2a2a}
    .stat-card h3{color:#c41e3a;font-size:14px;text-transform:uppercase;margin-bottom:10px}
    .stat-card .number{color:#fff;font-size:36px;font-weight:700}
    .content{background:#1a1a1a;padding:30px;border-radius:12px;border:1px solid #2a2a2a}
    .filters{display:flex;gap:15px;margin-bottom:25px;flex-wrap:wrap}
    .filter-btn{padding:10px 20px;background:#0a0a0a;border:2px solid #3a3a3a;color:#e0e0e0;border-radius:6px;cursor:pointer;font-size:14px}
    .filter-btn:hover{border-color:#c41e3a}
    .filter-btn.active{background:#c41e3a;border-color:#c41e3a}
    table{width:100%;border-collapse:collapse}
    th{padding:15px;text-align:left;color:#c41e3a;font-weight:600;font-size:14px;text-transform:uppercase;border-bottom:2px solid #2a2a2a}
    td{padding:15px;border-bottom:1px solid #2a2a2a;color:#e0e0e0}
    tr:hover{background:#252525}
    .status-badge{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:uppercase;display:inline-block}
    .status-PENDENTE{background:rgba(255,193,7,.1);color:#ffc107;border:1px solid #ffc107}
    .status-CONFIRMADA{background:rgba(76,175,80,.1);color:#4caf50;border:1px solid #4caf50}
    .status-CANCELADA{background:rgba(196,30,58,.1);color:#ff6b6b;border:1px solid #ff6b6b}
    .status-CHEGOU{background:rgba(33,150,243,.1);color:#2196f3;border:1px solid #2196f3}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-sm{padding:6px 12px;font-size:12px;border:none;border-radius:4px;cursor:pointer}
    .btn-confirm{background:#4caf50;color:#fff}
    .btn-cancel{background:#c41e3a;color:#fff}
    .btn-delete{background:#666;color:#fff}
    .btn-arrived{background:#2196f3;color:#fff}
    .no-data{text-align:center;padding:40px;color:#999}
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-box">
      <h1>🍕 Admin Login</h1>
      <div class="login-error" id="loginError">Usuário ou senha inválidos</div>
      <form id="loginForm">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="username" placeholder="Digite o usuário" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" placeholder="Digite a senha" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>
    </div>
  </div>

  <div id="adminPanel">
    <div class="header">
      <h1>Painel Administrativo</h1>
      <div>
        <button class="btn btn-refresh" id="btnRefresh">🔄 Atualizar</button>
        <button class="btn btn-logout" id="btnLogout">Sair</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <h3>Total</h3>
        <div class="number" id="totalReservas">0</div>
      </div>
      <div class="stat-card">
        <h3>Pendentes</h3>
        <div class="number" id="totalPendentes">0</div>
      </div>
      <div class="stat-card">
        <h3>Confirmadas</h3>
        <div class="number" id="totalConfirmadas">0</div>
      </div>
      <div class="stat-card">
        <h3>Hoje</h3>
        <div class="number" id="totalHoje">0</div>
      </div>
    </div>

    <div class="content">
      <h2 style="color:#ffffff;margin-bottom:20px;">Reservas</h2>

      <div class="filters" id="filterButtons">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="hoje">Hoje</button>
        <button class="filter-btn" data-filter="PENDENTE">Pendentes</button>
        <button class="filter-btn" data-filter="CONFIRMADA">Confirmadas</button>
      </div>

      <div id="tableContainer"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    console.log("[INIT] Iniciando aplicação...");

    const SUPABASE_URL = "https://tmwbqmwbldbocphfnrho.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtd2JxbXdibGRib2NwaGZucmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA1OTM2OTcsImV4cCI6MjA1NjE2OTY5N30.T7RIv52l5TJNqd7_KuoEf6cXTovpSO3a2CsMUPCrjd0";

    if (!window.supabase || !window.supabase.createClient) {
      console.error("[SUPABASE] Biblioteca não carregou.");
      alert("Erro: a biblioteca do Supabase não carregou. Verifique sua conexão.");
    }

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allReservations = [];
    let currentFilter = "todas";
    let autoRefreshInterval = null;

    document.addEventListener("DOMContentLoaded", function () {
      console.log("[DOM] Página carregada");

      const loginForm = document.getElementById("loginForm");
      const btnLogout = document.getElementById("btnLogout");
      const btnRefresh = document.getElementById("btnRefresh");
      const filterButtons = document.getElementById("filterButtons");

      if (loginForm) {
        loginForm.addEventListener("submit", function (e) {
          e.preventDefault();
          handleLogin();
        });
      }

      if (btnLogout) btnLogout.addEventListener("click", handleLogout);
      if (btnRefresh) btnRefresh.addEventListener("click", loadReservations);

      if (filterButtons) {
        filterButtons.addEventListener("click", function (e) {
          const btn = e.target.closest(".filter-btn");
          if (!btn) return;
          handleFilterClick(btn);
        });
      }
    });

    function handleLogin() {
      const usernameEl = document.getElementById("username");
      const passwordEl = document.getElementById("password");
      const errorDiv = document.getElementById("loginError");

      const username = (usernameEl?.value || "").trim();
      const password = (passwordEl?.value || "").trim();

      if (username === "admin" && password === "java2025") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        if (errorDiv) errorDiv.style.display = "none";
        loadReservations();
        startAutoRefresh();
      } else {
        if (errorDiv) errorDiv.style.display = "block";
      }
    }

    function handleLogout() {
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("loginError").style.display = "none";
      stopAutoRefresh();
    }

    function handleFilterClick(button) {
      currentFilter = button.getAttribute("data-filter") || "todas";
      document.querySelectorAll(".filter-btn").forEach((btn) => btn.classList.remove("active"));
      button.classList.add("active");
      renderTable();
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      autoRefreshInterval = setInterval(loadReservations, 10000);
    }

    function stopAutoRefresh() {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }
    }

    async function loadReservations() {
      try {
        const { data, error } = await supabaseClient
          .from("reservas")
          .select("*")
          .order("data", { ascending: false })
          .order("horario", { ascending: false });

        if (error) throw error;

        allReservations = data || [];
        updateStats();
        renderTable();
      } catch (error) {
        console.error("[RESERVAS] Erro:", error);
        const msg = error?.message ? String(error.message) : "Erro desconhecido";
        document.getElementById("tableContainer").innerHTML =
          '<div class="no-data">❌ Erro ao carregar reservas: ' + escapeHtml(msg) + "</div>";
      }
    }

    function updateStats() {
      const today = new Date().toISOString().split("T")[0];

      const total = allReservations.length;
      const pendentes = allReservations.filter((r) => r.status === "PENDENTE").length;
      const confirmadas = allReservations.filter((r) => r.status === "CONFIRMADA").length;
      const hoje = allReservations.filter((r) => r.data === today).length;

      document.getElementById("totalReservas").textContent = total;
      document.getElementById("totalPendentes").textContent = pendentes;
      document.getElementById("totalConfirmadas").textContent = confirmadas;
      document.getElementById("totalHoje").textContent = hoje;
    }

    function renderTable() {
      let filtered = allReservations;
      const today = new Date().toISOString().split("T")[0];

      if (currentFilter === "hoje") {
        filtered = allReservations.filter((r) => r.data === today);
      } else if (currentFilter !== "todas") {
        filtered = allReservations.filter((r) => r.status === currentFilter);
      }

      if (filtered.length === 0) {
        document.getElementById("tableContainer").innerHTML = '<div class="no-data">Nenhuma reserva encontrada</div>';
        return;
      }

      let html =
        "<table><thead><tr><th>Data</th><th>Horário</th><th>Nome</th><th>WhatsApp</th><th>Pessoas</th><th>Status</th><th>Ações</th></tr></thead><tbody>";

      filtered.forEach((r) => {
        const safeNome = escapeAttr(r.nome || "");
        html += "<tr>";
        html += "<td>" + formatDate(r.data) + "</td>";
        html += "<td>" + escapeHtml(r.horario || "") + "</td>";
        html += "<td>" + escapeHtml(r.nome || "") + "</td>";
        html += "<td>" + escapeHtml(r.whatsapp || "") + "</td>";
        html += "<td>" + escapeHtml(String(r.pessoas ?? "")) + "</td>";
        html += '<td><span class="status-badge status-' + escapeAttr(r.status || "") + '">' + escapeHtml(r.status || "") + "</span></td>";
        html += '<td><div class="actions">';

        if (r.status === "PENDENTE") {
          html += '<button class="btn-sm btn-confirm" onclick="updateStatus(' + Number(r.id) + ", 'CONFIRMADA')\">Confirmar</button>";
          html += '<button class="btn-sm btn-cancel" onclick="updateStatus(' + Number(r.id) + ", 'CANCELADA')\">Cancelar</button>";
        } else if (r.status === "CONFIRMADA") {
          html += '<button class="btn-sm btn-arrived" onclick="updateStatus(' + Number(r.id) + ", 'CHEGOU')\">Chegou</button>";
          html += '<button class="btn-sm btn-cancel" onclick="updateStatus(' + Number(r.id) + ", 'CANCELADA')\">Cancelar</button>";
        }

        html += '<button class="btn-sm btn-delete" onclick="deleteReservation(' + Number(r.id) + ", '" + safeNome + "')\">Excluir</button>";
        html += "</div></td>";
        html += "</tr>";
      });

      html += "</tbody></table>";
      document.getElementById("tableContainer").innerHTML = html;
    }

    async function updateStatus(id, newStatus) {
      try {
        const { error } = await supabaseClient.from("reservas").update({ status: newStatus }).eq("id", id);
        if (error) throw error;
        await loadReservations();
      } catch (error) {
        alert("Erro ao atualizar status: " + (error?.message || "erro"));
      }
    }

    async function deleteReservation(id, nome) {
      if (!confirm("Excluir reserva de " + nome + "?")) return;

      try {
        const { error } = await supabaseClient.from("reservas").delete().eq("id", id);
        if (error) throw error;
        await loadReservations();
      } catch (error) {
        alert("Erro ao excluir reserva: " + (error?.message || "erro"));
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const date = new Date(dateStr + "T00:00:00");
      return date.toLocaleDateString("pt-BR");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
