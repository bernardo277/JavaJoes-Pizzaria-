<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Java Joe's</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        #loginScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #2a2a2a;
        }

        .login-box h1 {
            color: #c41e3a;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #999;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0a0a0a;
            border: 2px solid #3a3a3a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c41e3a;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #a01729;
            transform: translateY(-2px);
        }

        .login-error {
            display: none;
            background: rgba(196, 30, 58, 0.1);
            border: 1px solid #c41e3a;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        #adminPanel {
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }

        .header h1 {
            color: #c41e3a;
            font-size: 32px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-logout {
            background: #666;
            color: white;
        }

        .btn-logout:hover {
            background: #444;
        }

        .btn-refresh {
            background: #2196f3;
            color: white;
            margin-right: 10px;
        }

        .btn-refresh:hover {
            background: #1976d2;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }

        .stat-card h3 {
            color: #c41e3a;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .number {
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
        }

        .content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: #0a0a0a;
            border: 2px solid #3a3a3a;
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .filter-btn:hover {
            border-color: #c41e3a;
        }

        .filter-btn.active {
            background: #c41e3a;
            border-color: #c41e3a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 15px;
            text-align: left;
            color: #c41e3a;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 2px solid #2a2a2a;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #2a2a2a;
            color: #e0e0e0;
        }

        tr:hover {
            background: #252525;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-PENDENTE {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .status-CONFIRMADA {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-CANCELADA {
            background: rgba(196, 30, 58, 0.1);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }

        .status-CHEGOU {
            background: rgba(33, 150, 243, 0.1);
            color: #2196f3;
            border: 1px solid #2196f3;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-confirm {
            background: #4caf50;
            color: white;
        }

        .btn-cancel {
            background: #c41e3a;
            color: white;
        }

        .btn-delete {
            background: #666;
            color: white;
        }

        .btn-arrived {
            background: #2196f3;
            color: white;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <h1>🍕 Admin Login</h1>
            <div class="login-error" id="loginError">Usuário ou senha inválidos</div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="username" placeholder="Digite o usuário" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="Digite a senha" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>

    <div id="adminPanel">
        <div class="header">
            <h1>Painel Administrativo</h1>
            <div>
                <button class="btn btn-refresh" id="btnRefresh">🔄 Atualizar</button>
                <button class="btn btn-logout" id="btnLogout">Sair</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total</h3>
                <div class="number" id="totalReservas">0</div>
            </div>
            <div class="stat-card">
                <h3>Pendentes</h3>
                <div class="number" id="totalPendentes">0</div>
            </div>
            <div class="stat-card">
                <h3>Confirmadas</h3>
                <div class="number" id="totalConfirmadas">0</div>
            </div>
            <div class="stat-card">
                <h3>Hoje</h3>
                <div class="number" id="totalHoje">0</div>
            </div>
        </div>

        <div class="content">
            <h2 style="color: #ffffff; margin-bottom: 20px;">Reservas</h2>
            
            <div class="filters" id="filterButtons">
                <button class="filter-btn active" data-filter="todas">Todas</button>
                <button class="filter-btn" data-filter="hoje">Hoje</button>
                <button class="filter-btn" data-filter="PENDENTE">Pendentes</button>
                <button class="filter-btn" data-filter="CONFIRMADA">Confirmadas</button>
            </div>

            <div id="tableContainer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        console.log('[INIT] Iniciando aplicação...');

        const SUPABASE_URL = 'https://tmwbqmwbldbocphfnrho.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtd2JxbXdibGRib2NwaGZucmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA1OTM2OTcsImV4cCI6MjA1NjE2OTY5N30.T7RIv52l5TJNqd7_KuoEf6cXTovpSO3a2CsMUPCrjd0';
        
        console.log('[SUPABASE] Verificando carregamento...', window.supabase ? 'OK' : 'ERRO');
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('[SUPABASE] Client criado:', supabase);
        
        let allReservations = [];
        let currentFilter = 'todas';
        let autoRefreshInterval = null;

        document.addEventListener('DOMContentLoaded', function() {
            console.log('[DOM] Página carregada');
            
            const loginForm = document.getElementById('loginForm');
            const btnLogout = document.getElementById('btnLogout');
            const btnRefresh = document.getElementById('btnRefresh');
            const filterButtons = document.getElementById('filterButtons');

            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('[LOGIN] Formulário submetido');
                    handleLogin();
                });
            }

            if (btnLogout) {
                btnLogout.addEventListener('click', function() {
                    console.log('[LOGOUT] Botão clicado');
                    handleLogout();
                });
            }

            if (btnRefresh) {
                btnRefresh.addEventListener('click', function() {
                    console.log('[REFRESH] Botão clicado');
                    loadReservations();
                });
            }

            if (filterButtons) {
                filterButtons.addEventListener('click', function(e) {
                    if (e.target.classList.contains('filter-btn')) {
                        console.log('[FILTER] Filtro clicado:', e.target.getAttribute('data-filter'));
                        handleFilterClick(e.target);
                    }
                });
            }
        });

        function handleLogin() {
            console.log('[LOGIN] Processando login...');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            console.log('[LOGIN] Usuário:', username);

            if (username === 'admin' && password === 'java2025') {
                console.log('[LOGIN] Credenciais corretas - abrindo painel');
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                errorDiv.style.display = 'none';
                
                console.log('[LOGIN] Carregando reservas...');
                loadReservations();
                startAutoRefresh();
            } else {
                console.log('[LOGIN] Credenciais incorretas');
                errorDiv.style.display = 'block';
            }
        }

        function handleLogout() {
            console.log('[LOGOUT] Deslogando...');
            
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').style.display = 'none';
            stopAutoRefresh();
        }

        function handleFilterClick(button) {
            currentFilter = button.getAttribute('data-filter');
            console.log('[FILTER] Filtro ativo:', currentFilter);
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            renderTable();
        }

        function startAutoRefresh() {
            console.log('[AUTO-REFRESH] Iniciando...');
            stopAutoRefresh();
            autoRefreshInterval = setInterval(loadReservations, 10000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                console.log('[AUTO-REFRESH] Parando...');
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        async function loadReservations() {
            console.log('[RESERVAS] Buscando reservas...');
            
            try {
                const { data, error } = await supabase
                    .from('reservas')
                    .select('*')
                    .order('data', { ascending: false })
                    .order('horario', { ascending: false });

                if (error) {
                    console.error('[RESERVAS] Erro do Supabase:', error);
                    throw error;
                }

                console.log('[RESERVAS] Reservas carregadas:', data ? data.length : 0);
                
                allReservations = data || [];
                updateStats();
                renderTable();
            } catch (error) {
                console.error('[RESERVAS] Erro fatal:', error);
                document.getElementById('tableContainer').innerHTML = '<div class="no-data">❌ Erro ao carregar reservas: ' + error.message + '</div>';
            }
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            
            const total = allReservations.length;
            const pendentes = allReservations.filter(r => r.status === 'PENDENTE').length;
            const confirmadas = allReservations.filter(r => r.status === 'CONFIRMADA').length;
            const hoje = allReservations.filter(r => r.data === today).length;
            
            console.log('[STATS] Total:', total, 'Pendentes:', pendentes, 'Confirmadas:', confirmadas, 'Hoje:', hoje);
            
            document.getElementById('totalReservas').textContent = total;
            document.getElementById('totalPendentes').textContent = pendentes;
            document.getElementById('totalConfirmadas').textContent = confirmadas;
            document.getElementById('totalHoje').textContent = hoje;
        }

        function renderTable() {
            console.log('[RENDER] Renderizando tabela...');
            
            let filtered = allReservations;
            const today = new Date().toISOString().split('T')[0];

            if (currentFilter === 'hoje') {
                filtered = allReservations.filter(r => r.data === today);
            } else if (currentFilter !== 'todas') {
                filtered = allReservations.filter(r => r.status === currentFilter);
            }

            console.log('[RENDER] Reservas filtradas:', filtered.length);

            if (filtered.length === 0) {
                document.getElementById('tableContainer').innerHTML = '<div class="no-data">Nenhuma reserva encontrada</div>';
                return;
            }

            let html = '<table><thead><tr><th>Data</th><th>Horário</th><th>Nome</th><th>WhatsApp</th><th>Pessoas</th><th>Status</th><th>Ações</th></tr></thead><tbody>';

            filtered.forEach(r => {
                html += '<tr>';
                html += '<td>' + formatDate(r.data) + '</td>';
                html += '<td>' + r.horario + '</td>';
                html += '<td>' + r.nome + '</td>';
                html += '<td>' + r.whatsapp + '</td>';
                html += '<td>' + r.pessoas + '</td>';
                html += '<td><span class="status-badge status-' + r.status + '">' + r.status + '</span></td>';
                html += '<td><div class="actions">';
                
                if (r.status === 'PENDENTE') {
                    html += '<button class="btn-sm btn-confirm" onclick="updateStatus(' + r.id + ', \'CONFIRMADA\')">Confirmar</button>';
                    html += '<button class="btn-sm btn-cancel" onclick="updateStatus(' + r.id + ', \'CANCELADA\')">Cancelar</button>';
                } else if (r.status === 'CONFIRMADA') {
                    html += '<button class="btn-sm btn-arrived" onclick="updateStatus(' + r.id + ', \'CHEGOU\')">Chegou</button>';
                    html += '<button class="btn-sm btn-cancel" onclick="updateStatus(' + r.id + ', \'CANCELADA\')">Cancelar</button>';
                }
                
                html += '<button class="btn-sm btn-delete" onclick="deleteReservation(' + r.id + ', \'' + r.nome.replace(/'/g, "\\'") + '\')">Excluir</button>';
                html += '</div></td>';
                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        async function updateStatus(id, newStatus) {
            console.log('[UPDATE] Atualizando status:', id, newStatus);
            
            try {
                const { error } = await supabase
                    .from('reservas')
                    .update({ status: newStatus })
                    .eq('id', id);

                if (error) throw error;
                
                console.log('[UPDATE] Status atualizado com sucesso');
                await loadReservations();
            } catch (error) {
                console.error('[UPDATE] Erro:', error);
                alert('Erro ao atualizar status: ' + error.message);
            }
        }

        async function deleteReservation(id, nome) {
            if (!confirm('Excluir reserva de ' + nome + '?')) return;

            console.log('[DELETE] Excluindo reserva:', id);

            try {
                const { error } = await supabase
                    .from('reservas')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                
                console.log('[DELETE] Reserva excluída com sucesso');
                await loadReservations();
            } catch (error) {
                console.error('[DELETE] Erro:', error);
                alert('Erro ao excluir reserva: ' + error.message);
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('pt-BR');
        }

        window.addEventListener('beforeunload', stopAutoRefresh);
    </script>
</body>
</html>
